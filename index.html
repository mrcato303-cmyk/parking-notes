const dec = s => Uint8Array.from(atob(s), c=>c.charCodeAt(0));
document.getElementById('f').addEventListener('submit', async (ev)=>{
  ev.preventDefault();
  const e = document.getElementById('e'); e.textContent='Checking...';
  const u = document.getElementById('u').value.trim();
  const p = document.getElementById('p').value;
  try{
    const salt=dec(PAYLOAD.salt), iv=dec(PAYLOAD.iv), data=dec(PAYLOAD.data);
    const km = new TextEncoder().encode(u + "\n" + p);
    const base = await crypto.subtle.importKey('raw', km, 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey(
      {name:'PBKDF2', salt, iterations:PAYLOAD.iter, hash:'SHA-256'},
      base, {name:'AES-GCM', length:256}, false, ['decrypt']);
    const plain = await crypto.subtle.decrypt({name:'AES-GCM', iv}, key, data);
    const html = new TextDecoder().decode(plain);
    document.open(); document.write(html); document.close();
  }catch(err){ e.textContent = 'Wrong username or password.'; }
});
</script>
